###############################################################################
# Gravitino IRC Benchmark — Scale Environment
#
# Extended version of gravitino-irc-benchmark with:
#   - PostgreSQL backend (production-grade vs MySQL)
#   - 2023 + 2024 NYC taxi data (~80M rows)
#   - 1,000 namespaces / 10,000 tables catalog scale test
#   - Higher concurrency tiers
#   - Polaris side-by-side comparison (coming)
#
# Services: PostgreSQL | Gravitino IRC 1.2.0 | Trino | Python
#
# Usage:
#   make up             — start all services
#   make load-data      — load 2023 + 2024 NYC taxi data
#   make populate       — create 1,000 namespaces / 10,000 tables
#   make benchmark      — run full benchmark suite
#   make down-clean     — stop and wipe all volumes
###############################################################################

name: gravitino-irc-scale

networks:
  bench-net:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Production-grade catalog backend replacing MySQL.
  postgres:
    image: postgres:15
    container_name: postgres
    networks: [bench-net]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Gravitino Iceberg REST Catalog (IRC) ───────────────────────────────────
  gravitino-irc:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.irc
    image: gravitino-irc-scale:1.2.0
    container_name: gravitino-irc
    networks: [bench-net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${IRC_PORT}:9001"
    environment:
      GRAVITINO_MEM: ${IRC_MEM}
      GRAVITINO_WAREHOUSE: s3://${S3_BUCKET}/
      GRAVITINO_CREDENTIAL_PROVIDERS: s3-secret-key
      GRAVITINO_S3_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      GRAVITINO_S3_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      GRAVITINO_S3_REGION: ${AWS_REGION}
      GRAVITINO_CATALOG_BACKEND: jdbc
      GRAVITINO_URI: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      GRAVITINO_JDBC_DRIVER: org.postgresql.Driver
      GRAVITINO_JDBC_USER: ${POSTGRES_USER}
      GRAVITINO_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION}
      GRAVITINO_AUTHENTICATORS: anonymous
      GRAVITINO_IO_IMPL: org.apache.iceberg.aws.s3.S3FileIO
    volumes:
      - ./conf/gravitino-irc/gravitino-iceberg-rest-server.conf:/opt/gravitino/conf/gravitino-iceberg-rest-server.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/iceberg/v1/config"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ── Trino ──────────────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:469
    container_name: trino
    networks: [bench-net]
    depends_on:
      gravitino-irc:
        condition: service_healthy
    ports:
      - "${TRINO_PORT}:8080"
    volumes:
      - ./conf/trino/config.properties:/etc/trino/config.properties:ro
      - ./conf/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./conf/trino/node.properties:/etc/trino/node.properties:ro
      - ./conf/trino/catalog/gravitino_irc.properties:/etc/trino/catalog/gravitino_irc.properties:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/status"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ── Python ─────────────────────────────────────────────────────────────────
  python:
    image: python:3.11-slim
    container_name: python
    networks: [bench-net]
    depends_on:
      gravitino-irc:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      IRC_URI: http://gravitino-irc:9001/iceberg
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./scripts:/scripts:ro
    working_dir: /scripts
    command: >
      /bin/sh -c "
        pip install --quiet pyiceberg==0.8.0 pyarrow boto3 trino requests tabulate &&
        tail -f /dev/null
      "
    restart: unless-stopped
