# ─────────────────────────────────────────────────────────────────────────────
# Trino Iceberg Catalog — Gravitino IRC Benchmark
# Catalog name in Trino: 'gravitino_irc'
# ─────────────────────────────────────────────────────────────────────────────

connector.name=iceberg

# ── REST Catalog ──────────────────────────────────────────────────────────────
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://gravitino-irc:9001/iceberg

# ── AWS S3 ────────────────────────────────────────────────────────────────────
# Native S3 filesystem (Trino >= 430 recommended approach).
# Credentials come from the EC2 IAM instance role automatically when
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are not set.
fs.native-s3.enabled=true
s3.region=us-east-2

# ── Iceberg Settings ──────────────────────────────────────────────────────────
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD
s3.aws-access-key=${env:AWS_ACCESS_KEY_ID}
s3.aws-secret-key=${env:AWS_SECRET_ACCESS_KEY}
